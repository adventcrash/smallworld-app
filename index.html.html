<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmallWorld — Collaborative Toy Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { display: ['Rajdhani','sans-serif'], body: ['IBM Plex Sans','sans-serif'], mono: ['JetBrains Mono','monospace'] },
      colors: {
        deep: '#080C16', slate: { dark: '#0B1120', card: '#111827', elevated: '#1A2332' },
        border: { base: '#1E3048', glow: 'rgba(0,229,255,0.15)' },
        cyan: { DEFAULT: '#00E5FF', dim: '#00E5FF88', bg: 'rgba(0,229,255,0.08)' },
        amber: { DEFAULT: '#FFB300', dim: '#FFB30088', bg: 'rgba(255,179,0,0.08)' },
        txt: { primary: '#E8ECF4', secondary: '#8899B4', muted: '#4A5A78' }
      }
    }
  }
}
</script>
<style>
:root {
  --cyan: #00E5FF; --amber: #FFB300; --deep: #080C16;
  --card: #111827; --elevated: #1A2332; --border: #1E3048;
  --txt: #E8ECF4; --txt2: #8899B4; --txt3: #4A5A78;
  --green: #00E676; --red: #FF3D57;
}
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: var(--deep); color: var(--txt); font-family: 'IBM Plex Sans', sans-serif; overflow-x: hidden; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--txt3); }
#main-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(8,12,22,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
.nav-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 72px; }
.nav-logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 28px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; cursor: pointer; }
.nav-logo span { color: var(--amber); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 15px; letter-spacing: 2px; padding: 10px 20px; border: 1px solid transparent; border-radius: 4px; background: transparent; color: var(--txt2); cursor: pointer; transition: all 0.2s; }
.nav-tab:hover { color: var(--txt); background: rgba(0,229,255,0.05); }
.nav-tab.active { color: var(--cyan); background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.3); }
.nav-user { position: relative; }
.nav-avatar-btn { width: 42px; height: 42px; border-radius: 4px; border: 2px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.2s; padding: 0; background: none; display: flex; align-items: center; justify-content: center; }
.nav-avatar-btn:hover { border-color: var(--cyan); }
.nav-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }
.user-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: none; z-index: 1100; overflow: hidden; min-width: 190px; }
.user-dropdown.open { display: block; animation: ddIn 0.2s ease; }
@keyframes ddIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
.user-dropdown button { display: flex; align-items: center; gap: 10px; padding: 11px 16px; width: 100%; border: none; background: none; color: var(--txt2); cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1.5px; transition: 0.15s; text-align: left; }
.user-dropdown button:hover { background: rgba(0,229,255,0.06); color: var(--txt); }
.user-dropdown button i { width: 16px; text-align: center; font-size: 13px; }
.scan-line { position: absolute; bottom: -1px; left: 0; width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); animation: scanMove 4s ease-in-out infinite; }
@keyframes scanMove { 0%,100%{ left:-120px; } 50%{ left:100%; } }
.page { display: none; min-height: 100vh; width: 100%; }
.page.active { display: block; animation: pageFade 0.35s ease; }
@keyframes pageFade { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
.hud-frame { position: relative; }
.hud-corner { position: absolute; width: 18px; height: 18px; pointer-events: none; z-index: 2; }
.hud-corner.tl { top:-1px; left:-1px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
.hud-corner.tr { top:-1px; right:-1px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
.hud-corner.bl { bottom:-1px; left:-1px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
.hud-corner.br { bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }
.hud-corner.amber.tl, .hud-corner.amber.tr, .hud-corner.amber.bl, .hud-corner.amber.br { border-color: var(--amber); }
.sys-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); }
.sys-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.sys-dot.cyan { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
.sys-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.sys-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-grid { background-image: radial-gradient(circle, rgba(30,48,72,0.5) 1px, transparent 1px); background-size: 28px 28px; }
.sw-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 0; overflow: hidden; transition: border-color 0.25s, box-shadow 0.25s; }
.sw-card:hover { border-color: rgba(0,229,255,0.25); box-shadow: 0 0 30px rgba(0,229,255,0.05); }
.tag-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; border: 1px solid var(--border); background: var(--elevated); color: var(--txt2); text-transform: uppercase; }
.tag-pill.collab { border-color: rgba(0,230,118,0.4); color: var(--green); background: rgba(0,230,118,0.06); }
.tag-pill.closed { border-color: rgba(74,90,120,0.4); color: var(--txt3); }
.collab-pulse { display: inline-flex; align-items: center; gap: 5px; }
.collab-pulse .cp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: cpulse 2s ease infinite; }
@keyframes cpulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(0,230,118,0.4); } 50%{ box-shadow: 0 0 0 5px rgba(0,230,118,0); } }
.sw-btn { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 2px; text-transform: uppercase; padding: 14px 28px; border-radius: 3px; cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 8px; }
.sw-btn-primary { background: var(--cyan); color: #080C16; }
.sw-btn-primary:hover { background: #33EBFF; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
.sw-btn-outline { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
.sw-btn-outline:hover { background: rgba(0,229,255,0.1); }
.sw-btn-amber { background: transparent; border: 1px solid var(--amber); color: var(--amber); }
.sw-btn-amber:hover { background: rgba(255,179,0,0.1); }
.sw-btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--txt2); }
.sw-btn-ghost:hover { border-color: var(--txt2); color: var(--txt); }
.sw-btn-follow { border: 1px solid var(--green); color: var(--green); background: transparent; }
.sw-btn-follow:hover { background: rgba(0,230,118,0.1); }
.sw-btn-following { border: 1px solid var(--txt3); color: var(--txt3); background: transparent; }
.sw-input { width: 100%; padding: 14px 16px; font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; background: var(--deep); border: 1px solid var(--border); border-radius: 3px; color: var(--txt); outline: none; transition: border-color 0.2s; }
.sw-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }
.sw-input::placeholder { color: var(--txt3); }
textarea.sw-input { resize: vertical; min-height: 100px; }
.sw-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt2); margin-bottom: 6px; display: block; }
.upload-zone { border: 2px dashed var(--border); border-radius: 4px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.upload-zone:hover { border-color: var(--cyan); background: rgba(0,229,255,0.04); }
.upload-zone.has-image { padding: 0; border-style: solid; border-color: var(--cyan); }
.upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }
.upload-zone .uz-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.upload-zone.has-image .uz-placeholder { display: none; }
.upload-zone .uz-preview { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
.upload-zone.has-image .uz-preview { display: block; }
.upload-zone .uz-preview img { width: 100%; height: 100%; object-fit: cover; }
.upload-zone .uz-remove { position: absolute; top: 8px; right: 8px; z-index: 3; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; }
.upload-zone.has-image .uz-remove { display: flex; }
.upload-zone .uz-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 1px; color: var(--txt2); }
.upload-zone .uz-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--txt3); }
#modal-overlay { position: fixed; inset: 0; z-index: 2000; display: none; background: rgba(4,6,10,0.85); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 24px; }
#modal-overlay.open { display: flex; }
#modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(16px); } to { opacity:1; transform: scale(1) translateY(0); } }
.toast { font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 14px 20px; border-radius: 3px; min-width: 280px; border: 1px solid var(--border); background: var(--elevated); color: var(--txt); display: flex; align-items: center; gap: 10px; animation: toastIn 0.3s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.toast.success { border-left: 3px solid var(--green); }
.toast.info { border-left: 3px solid var(--cyan); }
.toast.error { border-left: 3px solid var(--red); }
.toast.removing { animation: toastOut 0.3s ease forwards; }
@keyframes toastIn { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: translateX(0); } }
@keyframes toastOut { to { opacity:0; transform: translateX(40px); } }
.bts-card { position: relative; cursor: pointer; user-select: none; -webkit-user-select: none; }
.bts-card img { display: block; width: 100%; height: 100%; object-fit: cover; }
.bts-layer { position: absolute; inset: 0; clip-path: circle(0px at 50% 50%); }
.bts-indicator { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--amber); background: rgba(8,12,22,0.8); padding: 8px 16px; border: 1px solid rgba(255,179,0,0.3); border-radius: 2px; display: flex; align-items: center; gap: 8px; z-index: 3; transition: opacity 0.2s; }
.bts-card.revealing .bts-indicator { opacity: 0; }
.bts-label-reveal { position: absolute; top: 16px; right: 16px; z-index: 3; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; color: var(--amber); background: rgba(8,12,22,0.8); padding: 6px 12px; border: 1px solid rgba(255,179,0,0.3); border-radius: 2px; opacity: 0; transition: opacity 0.2s; }
.bts-card.revealing .bts-label-reveal { opacity: 1; }
#map-container { width: 100%; height: calc(100vh - 72px); position: relative; }
.leaflet-container { background: var(--deep) !important; }
.map-panel { position: absolute; z-index: 800; background: rgba(17,24,39,0.95); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 4px; }
.map-pin-btn { padding: 14px 24px; }
.map-pin-btn.active { background: rgba(0,229,255,0.15); border-color: var(--cyan); color: var(--cyan); animation: pinPulse 2s ease infinite; }
@keyframes pinPulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(0,229,255,0.3); } 50%{ box-shadow: 0 0 0 8px rgba(0,229,255,0); } }
.custom-marker { width: 32px; height: 32px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 12px rgba(0,0,0,0.5); }
.custom-marker.spot { border-color: var(--cyan); background: rgba(0,229,255,0.2); color: var(--cyan); }
.custom-marker.store { border-color: var(--amber); background: rgba(255,179,0,0.2); color: var(--amber); }
.thread-line { position: absolute; left: 28px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--cyan), transparent); }
.chapter-dot { position: absolute; left: 22px; top: 24px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--cyan); background: var(--deep); z-index: 2; }
.profile-banner { height: 160px; background: linear-gradient(135deg, rgba(0,229,255,0.06) 0%, rgba(255,179,0,0.04) 50%, var(--deep) 100%); border-bottom: 1px solid var(--border); }
.profile-banner.dot-grid { background-image: radial-gradient(circle, rgba(30,48,72,0.5) 1px, transparent 1px); background-size: 28px 28px; }
.profile-avatar { width: 96px; height: 96px; border-radius: 4px; border: 3px solid var(--card); margin-top: -48px; position: relative; z-index: 2; object-fit: cover; }
.stat-box { text-align: center; padding: 14px 0; border-right: 1px solid var(--border); }
.stat-box:last-child { border-right: none; }
.stat-num { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 28px; line-height: 1; color: var(--txt); }
.stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--txt3); text-transform: uppercase; margin-top: 2px; }
.clickable-name { cursor: pointer; transition: color 0.15s; }
.clickable-name:hover { color: var(--cyan) !important; }
#fab { position: fixed; bottom: 28px; right: 28px; z-index: 900; width: 60px; height: 60px; border-radius: 50%; background: var(--cyan); color: #080C16; border: none; font-size: 26px; cursor: pointer; box-shadow: 0 4px 20px rgba(0,229,255,0.3); transition: 0.2s; display: none; align-items: center; justify-content: center; }
#fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,229,255,0.45); }
#fab.visible { display: flex; }
.collab-check { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; }
.msg-layout { display: flex; flex-direction: column; height: calc(100vh - 72px); background: var(--deep); }
.msg-list-panel { flex-shrink: 0; height: 100%; overflow-y: auto; border-right: 1px solid var(--border); }
.msg-list-item { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.msg-list-item:hover { background: rgba(0,229,255,0.04); }
.msg-list-item.active { background: rgba(0,229,255,0.08); border-left: 3px solid var(--cyan); }
.msg-avatar { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
.msg-preview { flex: 1; min-width: 0; }
.msg-preview-name { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 15px; color: var(--txt); letter-spacing: 1px; }
.msg-preview-text { font-size: 13px; color: var(--txt2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.msg-unread-badge { background: var(--cyan); color: var(--deep); font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.msg-chat-panel { flex: 1; display: flex; flex-direction: column; height: 100%; }
.msg-chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: rgba(17,24,39,0.95); backdrop-filter: blur(12px); display: flex; align-items: center; gap: 12px; z-index: 10; }
.msg-chat-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 4px; font-size: 14px; line-height: 1.5; position: relative; }
.msg-bubble.sent { align-self: flex-end; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); color: var(--txt); }
.msg-bubble.received { align-self: flex-start; background: var(--card); border: 1px solid var(--border); color: var(--txt); }
.msg-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--txt3); margin-top: 6px; text-align: right; letter-spacing: 1px; }
.msg-input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 12px; align-items: center; }
.msg-input-area input { flex: 1; }
.msg-empty-state { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--txt3); }
.contest-subtabs { display: flex; border-bottom: 1px solid var(--border); margin-top: 16px; }
.contest-subtab { flex: 1; text-align: center; padding: 14px 0; font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 2px; color: var(--txt3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
.contest-subtab:hover { color: var(--txt2); }
.contest-subtab.active { color: var(--amber); border-bottom-color: var(--amber); }
.masonry-grid { columns: 2; column-gap: 16px; }
.masonry-item { break-inside: avoid; margin-bottom: 16px; }
.contest-fab { position: fixed; bottom: 28px; right: 28px; z-index: 900; width: 60px; height: 60px; border-radius: 50%; background: var(--amber); color: #080C16; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 20px rgba(255,179,0,0.3); transition: 0.2s; display: none; align-items: center; justify-content: center; }
.contest-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(255,179,0,0.45); }
.contest-fab.visible { display: flex; }
.accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
.accordion-body.open { max-height: 200px; }
.badge-rack { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
.badge-item { position: relative; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: var(--card); border: 2px solid var(--border); color: var(--txt3); font-size: 18px; }
.badge-item:hover { transform: translateY(-4px); }
.badge-item.t1 { border-color: #FFD700; color: #FFD700; box-shadow: 0 0 12px rgba(255, 215, 0, 0.3); }
.badge-item.t2 { border-color: #C0C0C0; color: #C0C0C0; box-shadow: 0 0 8px rgba(192, 192, 192, 0.2); }
.badge-item.t3 { border-color: #CD7F32; color: #CD7F32; box-shadow: 0 0 8px rgba(205, 127, 50, 0.2); }
.badge-popup { position: absolute; top: 120%; left: 50%; transform: translateX(-50%) scale(0.9); width: 220px; background: var(--elevated); border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 50; opacity: 0; pointer-events: none; transition: all 0.2s ease; overflow: hidden; }
.badge-item:hover .badge-popup { opacity: 1; transform: translateX(-50%) scale(1); pointer-events: auto; }
.badge-popup img { width: 100%; height: 120px; object-fit: cover; border-bottom: 1px solid var(--border); }
.badge-popup-info { padding: 12px; text-align: center; background: var(--elevated); }
.ad-slot-container { max-width: 960px; margin: 0 auto 24px; }
.ad-slot-hud { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 16px; text-align: center; position: relative; overflow: hidden; min-height: 100px; display: flex; align-items: center; justify-content: center; }
.ad-slot-hud::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.3; }
.ad-label { position: absolute; top: 4px; right: 8px; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 1px; color: var(--txt3); text-transform: uppercase; }
.ad-mobile-sticky { position: fixed; bottom: 0; left: 0; right: 0; z-index: 950; background: rgba(8,12,22,0.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); padding: 8px; text-align: center; display: none; }
@media (max-width: 768px) { .ad-mobile-sticky { display: block; } .ad-mobile-sticky .ad-slot-hud { border: none; background: transparent; min-height: 60px; } }

function readImageFile(inputEl, previewId, callback) {

  if (file.size > 10 * 1024 * 1024) { showToast('Image must be under 10MB','error'); inputEl.value=''; return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var zone = document.getElementById(previewId);
    if (zone) { zone.classList.add('has-image'); zone.querySelector('.uz-preview img').src = e.target.result; }
    callback(e.target.result);
  };
  reader.readAsDataURL(file);
}

async function handleLogin() {

    var pass = document.getElementById('auth-pass').value;
    if(!email || !pass) { showToast('Email and password required', 'error'); return; }
    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if(error) { showToast(error.message, 'error'); } else {
            showToast('Logged in!', 'success');
            var localUser = DB.users.find(u=>u.email === email);
            if(localUser) { currentUser = localUser; document.getElementById('nav-avatar-img').src=currentUser.avatar; }
            closeModal(); renderPage(currentPage);
        }
    } catch (e) { showToast("Connection Error: " + e.message, "error"); }
}
async function handleSignup() {
    if(!isLive) return;

    var pass = document.getElementById('auth-pass').value;
    if(!email || !pass) { showToast('Email and password required', 'error'); return; }
    try {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if(error) { showToast(error.message, 'error'); } else {
            showToast('Account created! Check email to verify.', 'success');
            var newName = email.split('@')[0];
            var newUser = { id: data.user.id, email: email, name: newName, avatar: 'https://picsum.photos/seed/new/100/100', bio: 'New to SmallWorld!', followers:[], following:[], joined: Date.now(), badges:[] };

}

async function uploadToSupabase(base64Data, path) {
    if(!isLive) return base64Data;
    try {
        const res = await fetch(base64Data);
        const blob = await res.blob();
        const fileName = path + '_' + Date.now() + '.jpg';
        const { data, error } = await supabaseClient.storage.from('photos').upload(fileName, blob, { contentType: 'image/jpeg' });
        if (error) throw error;
        const { data: { publicUrl } } = supabaseClient.storage.from('photos').getPublicUrl(fileName);
        return publicUrl;
    } catch(e) {
        console.error("Upload error:", e);
        showToast("Image upload failed", "error");
        return null;
    }
}
