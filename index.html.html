<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmallWorld — Collaborative Toy Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Rajdhani','sans-serif'],body:['IBM Plex Sans','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{deep:'#080C16',slate:{dark:'#0B1120',card:'#111827',elevated:'#1A2332'},border:{base:'#1E3048',hover:'#2E4868'},cyan:'#00F2FF',amber:'#FFB800',green:'#00FF94',error:'#FF3D57',txt1:'#E8ECF4',txt2:'#8899B4',txt3:'#4B5E7D'}}}};
</script>
<style>
:root{--deep:#080C16;--card:#111827;--border:#1E3048;--cyan:#00F2FF;--amber:#FFB800;--green:#00FF94;--error:#FF3D57;--txt1:#E8ECF4;--txt2:#8899B4;--txt3:#4B5E7D;--grad:linear-gradient(135deg, #00F2FF 0%, #0072FF 100%)}
body{background-color:var(--deep);color:var(--txt1);font-family:'IBM Plex Sans',sans-serif;margin:0;overflow-x:hidden}
.font-display{font-family:'Rajdhani',sans-serif}
.dot-grid{background-image:radial-gradient(rgba(30,48,72,0.4) 1px,transparent 1px);background-size:24px 24px}
.hud-frame{position:relative;border:1px solid var(--border);background:rgba(17,24,39,0.7);backdrop-filter:blur(8px);transition:all 0.3s ease}
.hud-corner{position:absolute;width:8px;height:8px;border-color:var(--cyan);border-style:solid;pointer-events:none}
.hud-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.hud-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.hud-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.hud-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.hud-corner.amber{border-color:var(--amber)}
.sw-card{position:relative;overflow:hidden;transition:transform 0.3s cubic-bezier(0.2,0,0.2,1)}
.sw-card:hover{transform:translateY(-4px)}
.sw-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;cursor:pointer;border:1px solid transparent}
.sw-btn-primary{background:var(--cyan);color:var(--deep)}
.sw-btn-primary:hover{background:#33F5FF;box-shadow:0 0 20px rgba(0,242,255,0.4)}
.sw-btn-amber{background:var(--amber);color:var(--deep)}
.sw-btn-outline{border:1px solid var(--cyan);color:var(--cyan);background:transparent}
.sw-btn-outline:hover{background:rgba(0,242,255,0.1)}
.sw-btn-ghost{color:var(--txt2);background:transparent}
.sw-btn-ghost:hover{color:var(--txt1);background:rgba(255,255,255,0.05)}
.sw-input{width:100%;background:rgba(8,12,22,0.8);border:1px solid var(--border);padding:12px 16px;color:var(--txt1);font-family:'JetBrains Mono',monospace;font-size:14px;transition:border-color 0.2s}
.sw-input:focus{outline:none;border-color:var(--cyan)}
.nav-item{position:relative;padding:12px;color:var(--txt2);transition:all 0.3s;cursor:pointer}
.nav-item.active{color:var(--cyan)}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.story-img-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;cursor:pointer}
.story-main-img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
.sw-card:hover .story-main-img{transform:scale(1.05)}
.story-grad{position:absolute;inset:0;pointer-events:none}
.story-text{position:absolute;bottom:0;left:0;right:0;padding:24px;pointer-events:auto}
.tag-pill{display:inline-flex;align-items:center;padding:4px 10px;background:rgba(30,48,72,0.6);border:1px solid var(--border);border-radius:2px;font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:0.5px}
.sys-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.sys-dot{width:6px;height:6px;border-radius:50%}
.sys-dot.cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.sys-dot.amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.sys-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(8,12,22,0.9);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-content{width:100%;max-width:560px;background:var(--slate-card);border:1px solid var(--border);position:relative}
.custom-scrollbar::-webkit-scrollbar{width:6px}
.custom-scrollbar::-webkit-scrollbar-track{background:var(--deep)}
.custom-scrollbar::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.bts-card{position:relative;cursor:pointer;overflow:hidden}
.bts-final-img{width:100%;height:100%;object-fit:cover;transition:opacity 0.3s}
.bts-bts-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.3s}
.bts-card.revealing .bts-bts-img{opacity:1}
.bts-card.revealing .bts-final-img{opacity:0.2}
.bts-card-info{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,22,0.9),transparent 50%);padding:20px;display:flex;flex-direction:column;justify-content:flex-end;pointer-events:none}
.bts-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(8,12,22,0.8);border:1px solid var(--amber);padding:10px 20px;border-radius:4px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--amber);opacity:0.8;transition:opacity 0.3s}
.bts-card.revealing .bts-indicator{opacity:0}
.bts-label-reveal{position:absolute;top:16px;right:16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);background:rgba(0,0,0,0.5);padding:4px 8px;border:1px solid var(--amber);opacity:0;transition:opacity 0.3s}
.bts-card.revealing .bts-label-reveal{opacity:1}
.admin-delete-btn{background:none;border:none;color:var(--error);cursor:pointer;opacity:0.5;transition:opacity 0.2s;padding:4px}
.admin-delete-btn:hover{opacity:1}
#map-container{position:relative;width:100%;height:calc(100vh - 140px);background:var(--deep)}
.map-panel{position:absolute;z-index:900;background:rgba(17,24,39,0.85);backdrop-filter:blur(10px);border:1px solid var(--border)}
.leaflet-popup-content-wrapper{background:var(--slate-card)!important;color:var(--txt1)!important;border:1px solid var(--border)!important;border-radius:0!important}
.leaflet-popup-tip{background:var(--border)!important}
.custom-marker{width:32px;height:32px;background:var(--deep);border:2px solid var(--cyan);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--cyan);box-shadow:0 0 10px rgba(0,242,255,0.3)}
.custom-marker.store{border-color:var(--amber);color:var(--amber)}
#toast-container{position:fixed;bottom:90px;right:24px;z-index:9999;display:flex;flex-col:column;gap:8px}
.toast{padding:12px 24px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;border-radius:2px;display:flex;align-items:center;gap:12px;animation:slideIn 0.3s forwards;box-shadow:0 8px 24px rgba(0,0,0,0.5);border-left:4px solid transparent}
.toast.success{background:#0B2E1D;color:#4ADE80;border-left-color:#4ADE80}
.toast.error{background:#3E1313;color:#F87171;border-left-color:#F87171}
.toast.info{background:#132E3E;color:#60A5FA;border-left-color:#60A5FA}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){.msg-layout{flex-direction:column}.msg-list-panel{width:100%!important;height:300px}.msg-chat-panel{height:calc(100vh - 440px)}}
</style>
</head>
<body>

<nav class="hud-frame sticky top-0 z-[100] px-4 md:px-8 border-t-0 border-x-0">
  <div class="max-w-7xl mx-auto flex items-center justify-between h-16">
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-cyan flex items-center justify-center text-deep font-bold text-xl">S</div>
        <span class="font-display font-bold text-xl tracking-tighter hidden sm:block">SMALLWORLD<span class="text-cyan">.APP</span></span>
      </div>
      <div class="h-6 w-px bg-border hidden md:block"></div>
      <div class="flex items-center gap-1">
        <div onclick="switchTab('feed')" class="nav-item active" id="tab-feed"><i class="fa-solid fa-house-signal"></i><span class="hidden lg:inline ml-2 font-display font-semibold text-sm">FEED</span></div>
        <div onclick="switchTab('bts')" class="nav-item" id="tab-bts"><i class="fa-solid fa-bolt"></i><span class="hidden lg:inline ml-2 font-display font-semibold text-sm">BTS</span></div>
        <div onclick="switchTab('map')" class="nav-item" id="tab-map"><i class="fa-solid fa-map-location-dot"></i><span class="hidden lg:inline ml-2 font-display font-semibold text-sm">TOY MAP</span></div>
        <div onclick="switchTab('wiki')" class="nav-item" id="tab-wiki"><i class="fa-solid fa-book-open"></i><span class="hidden lg:inline ml-2 font-display font-semibold text-sm">WIKI</span></div>
        <div onclick="switchTab('contest')" class="nav-item" id="tab-contest"><i class="fa-solid fa-trophy"></i><span class="hidden lg:inline ml-2 font-display font-semibold text-sm">CONTEST</span></div>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div id="auth-section" class="flex items-center gap-4">
        <button onclick="openModal('auth')" class="sw-btn sw-btn-outline" style="padding:8px 16px;font-size:12px">LOGIN</button>
      </div>
    </div>
  </div>
</nav>

<main id="main-content" class="dot-grid min-h-[calc(100vh-140px)]">
  <div id="feed-content" class="tab-pane"></div>
  <div id="bts-content" class="tab-pane hidden"></div>
  <div id="map-content" class="tab-pane hidden"></div>
  <div id="wiki-content" class="tab-pane hidden"></div>
  <div id="contest-content" class="tab-pane hidden"></div>
  <div id="msg-content" class="tab-pane hidden"></div>
  <div id="profile-content" class="tab-pane hidden"></div>
</main>

<div class="fixed bottom-0 inset-x-0 hud-frame border-b-0 border-x-0 h-16 md:h-20 flex items-center justify-around px-4 z-[100] md:hidden">
  <div onclick="switchTab('feed')" class="nav-item active"><i class="fa-solid fa-house-signal"></i></div>
  <div onclick="switchTab('map')" class="nav-item"><i class="fa-solid fa-map-location-dot"></i></div>
  <div onclick="openModal('create-story')" class="w-12 h-12 bg-cyan rounded flex items-center justify-center text-deep shadow-lg"><i class="fa-solid fa-plus text-xl"></i></div>
  <div onclick="switchTab('bts')" class="nav-item"><i class="fa-solid fa-bolt"></i></div>
  <div onclick="switchTab('msg')" class="nav-item"><i class="fa-solid fa-message"></i></div>
</div>

<div class="fixed bottom-8 right-8 flex-col gap-4 hidden md:flex z-50">
  <button onclick="switchTab('msg')" class="w-14 h-14 rounded-full hud-frame border-cyan text-cyan flex items-center justify-center shadow-2xl hover:scale-110 transition-transform"><i class="fa-solid fa-message text-xl"></i></button>
  <button onclick="openModal('create-story')" class="w-14 h-14 rounded-full bg-cyan text-deep flex items-center justify-center shadow-2xl hover:scale-110 transition-transform"><i class="fa-solid fa-plus text-2xl"></i></button>
</div>

<div id="modal-overlay" class="modal-overlay">
  <div class="modal-content custom-scrollbar" id="modal-inner"></div>
</div>

<div id="lightbox" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-4 cursor-zoom-out" onclick="this.classList.add('hidden')">
  <img id="lightbox-img" class="max-h-full max-w-full object-contain shadow-2xl" src="" alt="">
</div>

<div id="toast-container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// --- CORE CONFIG ---
const supabaseUrl = 'YOUR_SUPABASE_URL';
const supabaseKey = 'YOUR_SUPABASE_KEY';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
const isLive = true;

let DB = {
  posts: [],
  locations: [],
  wiki: [],
  btsEntries: [],
  messages: [],
  conversations: [],
  users: [],
  contestConfig: { active: false, theme: 'Cinematic Lighting', month: 'March 2026', deadline: null, prize: 'Epson Print Pack', rules: 'Standard' },
  contestEntries: []
};

let currentUser = { id: null, name: 'Guest', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Guest', isAdmin: false };
let activeTab = 'feed';
let activeWikiCat = 'All';
let mapInstance = null;
let mapMarkers = [];
let isPinning = false;
let pendingPinCoords = null;
let selectedLocType = 'Spot';
let pendingStoryImage = null;
let pendingLocImage = null;
let pendingContestImage = null;
let pendingBTSImage = null;
let pendingBTSSetupImage = null;
let activeConvoId = null;

// --- INIT ---
window.onload = async function() {
  if (isLive) {
    showToast('Connecting to grid...', 'info');
    await loadInitialData();
  }
  renderFeed();
  checkAuth();
};

async function loadInitialData() {
  try {
    const p = await supabaseClient.from('posts').select('*').order('timestamp', { ascending: false });
    if (p.data) DB.posts = p.data;
    
    const l = await supabaseClient.from('locations').select('*');
    if (l.data) DB.locations = l.data;

    const w = await supabaseClient.from('wiki').select('*');
    if (w.data) DB.wiki = w.data;

    const b = await supabaseClient.from('bts_entries').select('*').order('timestamp', { ascending: false });
    if (b.data) DB.btsEntries = b.data;

    const c = await supabaseClient.from('contest_entries').select('*').order('timestamp', { ascending: false });
    if (c.data) DB.contestEntries = c.data;

    const cf = await supabaseClient.from('contest_config').select('*').limit(1);
    if (cf.data && cf.data[0]) DB.contestConfig = cf.data[0];

    const u = await supabaseClient.from('users').select('*');
    if (u.data) DB.users = u.data;

    // Hardcoded Admin
    if (currentUser.email === 'YOUR_ADMIN_EMAIL') currentUser.isAdmin = true;
  } catch (e) {
    console.error("Load error:", e);
  }
}

// --- NAVIGATION ---
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
  document.getElementById(tab + '-content').classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('#tab-' + tab).forEach(i => i.classList.add('active'));

  if (tab === 'feed') renderFeed();
  if (tab === 'map') setTimeout(initMap, 100);
  if (tab === 'wiki') renderWiki();
  if (tab === 'bts') renderBTS();
  if (tab === 'contest') renderContest();
  if (tab === 'msg') renderMessages();
}

// --- AUTH ---
function checkAuth() {
  const session = localStorage.getItem('sw_session');
  if (session) {
    currentUser = JSON.parse(session);
    updateAuthUI();
  }
}

function updateAuthUI() {
  const area = document.getElementById('auth-section');
  if (currentUser.id) {
    area.innerHTML = `
      <div class="flex items-center gap-3 cursor-pointer" onclick="showProfile('${currentUser.name}')">
        <div class="text-right hidden sm:block">
          <p class="font-display font-bold text-sm tracking-wider">${currentUser.name.toUpperCase()}</p>
          <p class="sys-label" style="font-size:8px">${currentUser.isAdmin ? 'ADMIN ACCESS' : 'OPERATOR'}</p>
        </div>
        <img src="${currentUser.avatar}" class="w-10 h-10 rounded border border-border hover:border-cyan transition-colors" alt="">
      </div>
    `;
  }
}

// --- UTILS ---
function showToast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icon = type === 'success' ? 'circle-check' : type === 'error' ? 'triangle-exclamation' : 'circle-info';
  t.innerHTML = `<i class="fa-solid fa-${icon}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  lb.classList.remove('hidden');
  lb.style.display = 'flex';
}

function timeAgo(ts) {
  const ms = Date.now() - ts;
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return mins + 'M AGO';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'H AGO';
  return Math.floor(hrs / 24) + 'D AGO';
}

// --- SUPABASE UPLOAD ---
async function uploadToSupabase(file, folder) {
  const ext = file.name.split('.').pop();
  const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${ext}`;
  const filePath = `${folder}/${fileName}`;

  const { data, error } = await supabaseClient.storage.from('images').upload(filePath, file);
  if (error) {
    showToast('Upload failed: ' + error.message, 'error');
    return null;
  }
  const { data: publicUrl } = supabaseClient.storage.from('images').getPublicUrl(filePath);
  return publicUrl.publicUrl;
}

// --- STORY FEED ---
function getRootPosts() { return DB.posts.filter(p => p.parentId === null); }
function getChapters(rootId) { return DB.posts.filter(p => p.parentId === rootId).sort((a, b) => a.timestamp - b.timestamp); }

async function likePost(id) {
  const p = DB.posts.find(x => x.id === id);
  if (p) {
    p.likes++;
    if (isLive) {
      await supabaseClient.from('posts').update({ likes: p.likes }).eq('id', id);
    }
    renderFeed();
    showToast('Boost sent!', 'success');
  }
}

async function deletePost(id) {
  if (isLive) {
    await supabaseClient.from('posts').delete().eq('id', id);
    await supabaseClient.from('posts').delete().eq('parentId', id);
  }
  DB.posts = DB.posts.filter(p => p.id !== id && p.parentId !== id);
  closeModal();
  renderFeed();
  showToast('Story archived', 'error');
}

// --- BTS SYSTEM ---
function renderBTS() {
  const entries = DB.btsEntries;
  let h = `
    <div style="min-height:100vh;padding:32px 24px 80px;">
      <div style="max-width:1100px;margin:0 auto;">
        <div class="flex items-center gap-4 mb-4">
          <div class="h-px flex-1" style="background:var(--border)"></div>
          <h1 class="font-display font-bold text-3xl tracking-widest" style="color:var(--amber)">BEHIND THE SCENES</h1>
          <div class="h-px flex-1" style="background:var(--border)"></div>
        </div>
        <p class="text-center mb-4" style="color:var(--txt2);max-width:600px;margin:0 auto;">Hold to reveal the setup. Tap to view full size.</p>
        <div class="flex justify-center mb-10">
           <button onclick="openModal('create-bts')" class="sw-btn sw-btn-amber"><i class="fa-solid fa-bolt"></i> SHARE SETUP</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
  
  if (entries.length === 0) {
    h += `<div class="col-span-full text-center p-20 sys-label">NO INTEL YET</div>`;
  } else {
    entries.forEach(e => {
      h += `
        <div class="hud-frame">
          <span class="hud-corner tl amber"></span><span class="hud-corner tr amber"></span>
          <span class="hud-corner bl amber"></span><span class="hud-corner br amber"></span>
          <div class="sw-card">
            <div class="bts-card" style="height:350px;" data-final-src="${e.image}">
              <img class="bts-final-img" src="${e.image}" alt="" draggable="false">
              <img class="bts-bts-img" src="${e.btsImage || e.image}" alt="" draggable="false">
              <div class="bts-indicator"><i class="fa-solid fa-bolt"></i> HOLD TO REVEAL</div>
              <div class="bts-label-reveal">TOP SECRET SETUP</div>
              <div class="bts-card-info">
                <p class="font-display font-bold text-lg tracking-wider">${e.title}</p>
                <p class="sys-label">${e.author} • ${timeAgo(e.timestamp)}</p>
              </div>
            </div>
            <div class="p-4 flex items-center justify-between bg-slate-dark">
               <button onclick="likeBTS('${e.id}')" class="text-txt2 text-sm"><i class="fa-solid fa-heart mr-2"></i>${e.likes}</button>
               ${currentUser.isAdmin ? `<button onclick="deleteBTS('${e.id}')" class="admin-delete-btn"><i class="fa-solid fa-trash"></i></button>` : ''}
            </div>
          </div>
        </div>`;
    });
  }
  h += `</div></div></div>`;
  document.getElementById('bts-content').innerHTML = h;
  attachBTSListeners();
}

function attachBTSListeners() {
  document.querySelectorAll('.bts-card').forEach(card => {
    let timer;
    let isHolding = false;
    const start = () => { timer = setTimeout(() => { card.classList.add('revealing'); isHolding = true; }, 150); };
    const end = () => { clearTimeout(timer); card.classList.remove('revealing'); setTimeout(() => isHolding = false, 50); };
    card.addEventListener('mousedown', start);
    card.addEventListener('touchstart', start);
    card.addEventListener('mouseup', end);
    card.addEventListener('touchend', end);
    card.addEventListener('mouseleave', end);
    card.addEventListener('click', (e) => { if(!isHolding) openLightbox(card.dataset.finalSrc); });
  });
}

async function likeBTS(id) {
  const e = DB.btsEntries.find(x => x.id === id);
  if (e) {
    e.likes++;
    if (isLive) await supabaseClient.from('bts_entries').update({ likes: e.likes }).eq('id', id);
    renderBTS();
  }
}

// --- FIXED DELETE BTS FUNCTION ---
async function deleteBTS(btsId) {
    if (!confirm('Are you sure you want to delete this intel?')) return;
    
    if (isLive) {
        try {
            const { error } = await supabaseClient
                .from('bts_entries')
                .delete()
                .eq('id', btsId);

            if (error) {
                showToast('Failed to delete from DB: ' + error.message, 'error');
                return;
            }
        } catch (e) {
            showToast('Connection error', 'error');
            return;
        }
    }

    // Only update local UI if DB delete was successful (or not in live mode)
    DB.btsEntries = DB.btsEntries.filter(function(b) { return b.id !== btsId; });
    renderBTS();
    showToast('BTS Entry Deleted', 'success');
}

// --- FIXED SUBMIT BTS FUNCTION ---
async function submitCreateBTS() {
  if (!currentUser.id) return showToast('Login required', 'error');
  const title = document.getElementById('bts-title').value.trim();
  if (!title || !pendingBTSImage || !pendingBTSSetupImage) return showToast('Incomplete data', 'error');

  showToast('Uploading Intel...', 'info');
  const img = await uploadToSupabase(pendingBTSImage, 'bts');
  const btsImg = await uploadToSupabase(pendingBTSSetupImage, 'bts');

  if (img && btsImg) {
    const entry = {
      author: currentUser.name,
      avatar: currentUser.avatar,
      title: title,
      image: img,
      btsImage: btsImg,
      timestamp: Date.now(),
      likes: 0,
      tags: []
    };

    if (isLive) {
      // Return the inserted data so we get the REAL database ID
      const { data, error } = await supabaseClient.from('bts_entries').insert([entry]).select();
      if (error) return showToast(error.message, 'error');
      if (data && data[0]) {
        DB.btsEntries.unshift(data[0]); // Add the record with the real UUID
      }
    } else {
      entry.id = 'bts' + Date.now();
      DB.btsEntries.unshift(entry);
    }

    closeModal();
    renderBTS();
    showToast('Intel shared!', 'success');
  }
}

// --- MAP SYSTEM ---
function initMap() {
  const container = document.getElementById('map-content');
  container.innerHTML = `
    <div id="map-container">
      <div id="leaflet-map" style="width:100%;height:100%;"></div>
      <div class="map-panel top-4 left-4 p-5 min-w-[240px]">
        <div class="flex items-center gap-3 mb-4 text-cyan font-display font-bold text-lg">
          <i class="fa-solid fa-map-location-dot"></i> WORLD SCANNER
        </div>
        <button id="pin-toggle" onclick="togglePinMode()" class="sw-btn sw-btn-ghost w-full border border-border mb-4">
          <i class="fa-solid fa-map-pin"></i> DROP PIN
        </button>
        <div class="sys-label">${DB.locations.length} ACTIVE SIGNALS</div>
      </div>
    </div>`;

  mapInstance = L.map('leaflet-map', { zoomControl: false }).setView([41.8781, -87.6298], 10);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(mapInstance);
  
  mapInstance.on('click', e => {
    if (isPinning) {
      pendingPinCoords = e.latlng;
      openModal('add-location');
    }
  });

  renderMapMarkers();
}

function renderMapMarkers() {
  mapMarkers.forEach(m => mapInstance.removeLayer(m));
  DB.locations.forEach(loc => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker ${loc.type === 'Store' ? 'store' : ''}"><i class="fa-solid ${loc.type === 'Store' ? 'fa-store' : 'fa-camera'}"></i></div>`,
      iconSize: [32,32]
    });
    const m = L.marker([loc.lat, loc.lng], { icon }).addTo(mapInstance);
    m.bindPopup(`<div class="p-2 font-display"><b>${loc.name}</b><br><span class="text-xs text-txt2">${loc.description}</span></div>`);
    mapMarkers.push(m);
  });
}

function togglePinMode() {
  isPinning = !isPinning;
  const btn = document.getElementById('pin-toggle');
  btn.classList.toggle('border-cyan', isPinning);
  btn.innerHTML = isPinning ? '<i class="fa-solid fa-crosshairs"></i> SELECT POSITION' : '<i class="fa-solid fa-map-pin"></i> DROP PIN';
  document.getElementById('leaflet-map').style.cursor = isPinning ? 'crosshair' : '';
}

// --- MODAL ENGINE ---
function openModal(type, data) {
  const modal = document.getElementById('modal-overlay');
  const inner = document.getElementById('modal-inner');
  modal.style.display = 'flex';
  
  let h = `<button onclick="closeModal()" class="absolute top-4 right-4 text-txt3 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>`;
  
  if (type === 'create-bts') {
    h += `
      <div class="p-8">
        <h2 class="font-display font-bold text-2xl mb-6 text-amber">SHARE INTEL (BTS)</h2>
        <div class="space-y-4">
          <input id="bts-title" class="sw-input" placeholder="Title (e.g. Gotham Rooftop)">
          <div class="grid grid-cols-2 gap-4">
            <label class="hud-frame p-4 text-center cursor-pointer border-dashed">
              <span class="sys-label justify-center">FINAL SHOT</span>
              <input type="file" class="hidden" onchange="pendingBTSImage=this.files[0]">
            </label>
            <label class="hud-frame p-4 text-center cursor-pointer border-dashed">
              <span class="sys-label justify-center">SETUP SHOT</span>
              <input type="file" class="hidden" onchange="pendingBTSSetupImage=this.files[0]">
            </label>
          </div>
          <button onclick="submitCreateBTS()" class="sw-btn sw-btn-amber w-full justify-center mt-4">PUBLISH TO FEED</button>
        </div>
      </div>`;
  } else if (type === 'create-story') {
    h += `
      <div class="p-8">
        <h2 class="font-display font-bold text-2xl mb-6 text-cyan">ESTABLISH NEW THREAD</h2>
        <div class="space-y-4">
          <input id="s-title" class="sw-input" placeholder="Mission Title">
          <textarea id="s-caption" class="sw-input h-32" placeholder="Describe the scene..."></textarea>
          <label class="hud-frame p-6 block text-center cursor-pointer border-dashed border-cyan/30">
             <i class="fa-solid fa-camera text-2xl text-cyan mb-2"></i>
             <p class="sys-label justify-center">UPLOAD VISUAL DATA</p>
             <input type="file" class="hidden" onchange="pendingStoryImage=this.files[0]">
          </label>
          <button onclick="submitStory()" class="sw-btn sw-btn-primary w-full justify-center">INITIATE FEED</button>
        </div>
      </div>`;
  } else if (type === 'auth') {
    h += `
      <div class="p-8 text-center">
        <h2 class="font-display font-bold text-2xl mb-2 text-cyan">IDENTITY VERIFICATION</h2>
        <p class="text-txt2 mb-8 text-sm">Access the SmallWorld encrypted network.</p>
        <div class="space-y-4">
          <input id="auth-email" class="sw-input" placeholder="E-MAIL">
          <input id="auth-pass" type="password" class="sw-input" placeholder="PASSCODE">
          <button onclick="login()" class="sw-btn sw-btn-primary w-full justify-center">LOGIN</button>
        </div>
      </div>`;
  }
  
  inner.innerHTML = h;
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  pendingBTSImage = null;
  pendingBTSSetupImage = null;
  pendingStoryImage = null;
}
