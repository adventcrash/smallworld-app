<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmallWorld — Collaborative Toy Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Rajdhani','sans-serif'],body:['IBM Plex Sans','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{deep:'#080C16',slate:{dark:'#0B1120',card:'#111827',elevated:'#1A2332'},border:{base:'#1E3048',glow:'rgba(0,229,255,0.15)'},cyan:{DEFAULT:'#00E5FF',dim:'#00E5FF88',bg:'rgba(0,229,255,0.08)'},amber:{DEFAULT:'#FFB300',dim:'#FFB30088',bg:'rgba(255,179,0,0.08)'},txt:{primary:'#E8ECF4',secondary:'#8899B4',muted:'#4A5A78'}}}}}
</script>
<style>
:root{--cyan:#00E5FF;--amber:#FFB300;--deep:#080C16;--card:#111827;--elevated:#1A2332;--border:#1E3048;--txt:#E8ECF4;--txt2:#8899B4;--txt3:#4A5A78;--green:#00E676;--red:#FF3D57;--purple:#A855F7}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:var(--deep);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--deep)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--txt3)}
#main-nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(8,12,22,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:72px}
.nav-logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:28px;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;cursor:pointer}.nav-logo span{color:var(--amber)}
.nav-tabs{display:flex;gap:4px}
.nav-tab{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;letter-spacing:2px;padding:10px 20px;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s}
.nav-tab:hover{color:var(--txt);background:rgba(0,229,255,0.05)}.nav-tab.active{color:var(--cyan);background:rgba(0,229,255,0.1);border-color:rgba(0,229,255,0.3)}
.nav-user{position:relative}
.nav-avatar-btn{width:42px;height:42px;border-radius:4px;border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:.2s;padding:0;background:none;display:flex;align-items:center;justify-content:center}.nav-avatar-btn:hover{border-color:var(--cyan)}.nav-avatar-btn img{width:100%;height:100%;object-fit:cover}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border);border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;z-index:1100;overflow:hidden;min-width:190px}.user-dropdown.open{display:block;animation:ddIn .2s ease}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.user-dropdown button{display:flex;align-items:center;gap:10px;padding:11px 16px;width:100%;border:none;background:none;color:var(--txt2);cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;transition:.15s;text-align:left}.user-dropdown button:hover{background:rgba(0,229,255,0.06);color:var(--txt)}.user-dropdown button i{width:16px;text-align:center;font-size:13px}
.scan-line{position:absolute;bottom:-1px;left:0;width:120px;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanMove 4s ease-in-out infinite}
@keyframes scanMove{0%,100%{left:-120px}50%{left:100%}}
.page{display:none;min-height:100vh;width:100%}.page.active{display:block;animation:pageFade .35s ease}
@keyframes pageFade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.hud-frame{position:relative}.hud-corner{position:absolute;width:18px;height:18px;pointer-events:none;z-index:2}
.hud-corner.tl{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.hud-corner.tr{top:-1px;right:-1px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.hud-corner.bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.hud-corner.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.hud-corner.amber.tl,.hud-corner.amber.tr,.hud-corner.amber.bl,.hud-corner.amber.br{border-color:var(--amber)}
.sys-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt3)}
.sys-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.sys-dot.cyan{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}.sys-dot.amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}.sys-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}.sys-dot.purple{background:var(--purple);box-shadow:0 0 6px var(--purple)}
.dot-grid{background-image:radial-gradient(circle,rgba(30,48,72,0.5) 1px,transparent 1px);background-size:28px 28px}
.sw-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:0;overflow:hidden;transition:border-color .25s,box-shadow .25s}.sw-card:hover{border-color:rgba(0,229,255,0.25);box-shadow:0 0 30px rgba(0,229,255,0.05)}
.tag-pill{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;padding:4px 10px;border-radius:2px;border:1px solid var(--border);background:var(--elevated);color:var(--txt2);text-transform:uppercase}
.tag-pill.collab{border-color:rgba(0,230,118,0.4);color:var(--green);background:rgba(0,230,118,0.06)}.tag-pill.closed{border-color:rgba(74,90,120,0.4);color:var(--txt3)}
.collab-pulse{display:inline-flex;align-items:center;gap:5px}.collab-pulse .cp-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:cpulse 2s ease infinite}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.4)}50%{box-shadow:0 0 0 5px rgba(0,230,118,0)}}
.sw-btn{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;text-transform:uppercase;padding:14px 28px;border-radius:3px;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:8px}
.sw-btn-primary{background:var(--cyan);color:#080C16}.sw-btn-primary:hover{background:#33EBFF;box-shadow:0 0 20px rgba(0,229,255,0.3)}
.sw-btn-outline{background:transparent;border:1px solid var(--cyan);color:var(--cyan)}.sw-btn-outline:hover{background:rgba(0,229,255,0.1)}
.sw-btn-amber{background:transparent;border:1px solid var(--amber);color:var(--amber)}.sw-btn-amber:hover{background:rgba(255,179,0,0.1)}
.sw-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--txt2)}.sw-btn-ghost:hover{border-color:var(--txt2);color:var(--txt)}
.sw-btn-follow{border:1px solid var(--green);color:var(--green);background:transparent}.sw-btn-follow:hover{background:rgba(0,230,118,0.1)}
.sw-btn-following{border:1px solid var(--txt3);color:var(--txt3);background:transparent}
.sw-btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}.sw-btn-danger:hover{background:rgba(255,61,87,0.1)}
.sw-btn-sm{padding:8px 16px;font-size:12px}
.sw-input{width:100%;padding:14px 16px;font-family:'IBM Plex Sans',sans-serif;font-size:15px;background:var(--deep);border:1px solid var(--border);border-radius:3px;color:var(--txt);outline:none;transition:border-color .2s}.sw-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,0.1)}.sw-input::placeholder{color:var(--txt3)}
textarea.sw-input{resize:vertical;min-height:100px}
.sw-label{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px;display:block}
.upload-zone{border:2px dashed var(--border);border-radius:4px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}.upload-zone:hover{border-color:var(--cyan);background:rgba(0,229,255,0.04)}
.upload-zone.has-image{padding:0;border-style:solid;border-color:var(--cyan)}.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.upload-zone .uz-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px}.upload-zone.has-image .uz-placeholder{display:none}
.upload-zone .uz-preview{display:none;width:100%;height:100%;position:absolute;inset:0}.upload-zone.has-image .uz-preview{display:block}.upload-zone .uz-preview img{width:100%;height:100%;object-fit:cover}
.upload-zone .uz-remove{position:absolute;top:8px;right:8px;z-index:3;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}.upload-zone.has-image .uz-remove{display:flex}
.upload-zone .uz-label{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:1px;color:var(--txt2)}.upload-zone .uz-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.upload-zone.required-zone{border-color:rgba(255,61,87,0.3)}.upload-zone.required-zone.has-image{border-color:var(--cyan)}
#modal-overlay{position:fixed;inset:0;z-index:2000;display:none;background:rgba(4,6,10,0.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px}#modal-overlay.open{display:flex}
#modal-box{background:var(--card);border:1px solid var(--border);border-radius:4px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.toast{font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:14px 20px;border-radius:3px;min-width:280px;border:1px solid var(--border);background:var(--elevated);color:var(--txt);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.success{border-left:3px solid var(--green)}.toast.info{border-left:3px solid var(--cyan)}.toast.error{border-left:3px solid var(--red)}.toast.removing{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
#lightbox-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.96);display:none;align-items:center;justify-content:center;flex-direction:column;cursor:zoom-out}
#lightbox-overlay.open{display:flex;animation:lbIn .25s ease}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
#lightbox-img{max-width:94vw;max-height:90vh;object-fit:contain;border-radius:2px;cursor:default;user-select:none;-webkit-user-drag:none}
#lightbox-close{position:fixed;top:16px;right:16px;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3001;transition:.2s}
#lightbox-close:hover{background:rgba(255,255,255,0.18)}
.img-zoomable{cursor:zoom-in;transition:opacity .15s}.img-zoomable:hover{opacity:0.92}
.story-img-wrap{position:relative;height:320px;overflow:hidden;cursor:zoom-in}
.story-img-wrap.sm-chapter{height:auto;min-height:160px}
.story-img-wrap .story-main-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.story-img-wrap.sm-chapter .story-main-img{position:relative;height:160px}
.story-img-wrap .story-grad{position:absolute;inset:0;pointer-events:none}
.story-img-wrap .story-text{position:absolute;bottom:0;left:0;right:0;padding:24px 28px;z-index:3}
.story-img-wrap.sm-chapter .story-text{padding:16px 20px}
.story-acts{position:relative;z-index:4}
.story-avatar{width:36px;height:36px;min-width:36px;min-height:36px;max-width:36px;max-height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan);cursor:pointer;transition:transform .15s}
.story-avatar:hover{transform:scale(1.1)}
.story-avatar-small{width:24px;height:24px;min-width:24px;min-height:24px;max-width:24px;max-height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--cyan);cursor:pointer}
.bts-card{position:relative;cursor:pointer;user-select:none;-webkit-user-select:none;overflow:hidden;border-radius:4px}
.bts-card .bts-final-img{display:block;width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.bts-card .bts-bts-img{display:block;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .5s ease;z-index:1}
.bts-card.revealing .bts-bts-img{opacity:1}
.bts-card .bts-card-info{position:absolute;inset:0;z-index:2;pointer-events:none}
.bts-card .bts-card-info>*{pointer-events:auto}
.bts-indicator{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--amber);background:rgba(8,12,22,0.85);padding:8px 16px;border:1px solid rgba(255,179,0,0.3);border-radius:2px;display:flex;align-items:center;gap:8px;z-index:3;transition:opacity .3s;pointer-events:none}
.bts-card.revealing .bts-indicator{opacity:0}
.bts-label-reveal{position:absolute;top:16px;right:16px;z-index:3;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;color:var(--amber);background:rgba(8,12,22,0.85);padding:6px 12px;border:1px solid rgba(255,179,0,0.3);border-radius:2px;opacity:0;transition:opacity .3s;pointer-events:none}.bts-card.revealing .bts-label-reveal{opacity:1}
#map-container{width:100%;height:calc(100vh - 72px);position:relative}.leaflet-container{background:var(--deep)!important}
.map-panel{position:absolute;z-index:800;background:rgba(17,24,39,0.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:4px}
.map-pin-btn{padding:14px 24px}.map-pin-btn.active{background:rgba(0,229,255,0.15);border-color:var(--cyan);color:var(--cyan);animation:pinPulse 2s ease infinite}
@keyframes pinPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.3)}50%{box-shadow:0 0 0 8px rgba(0,229,255,0)}}
.custom-marker{width:32px;height:32px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(0,0,0,0.5)}
.custom-marker.spot{border-color:var(--cyan);background:rgba(0,229,255,0.2);color:var(--cyan)}.custom-marker.store{border-color:var(--amber);background:rgba(255,179,0,0.2);color:var(--amber)}
.thread-line{position:absolute;left:28px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--cyan),transparent)}
.chapter-dot{position:absolute;left:22px;top:24px;width:14px;height:14px;border-radius:50%;border:2px solid var(--cyan);background:var(--deep);z-index:2}
.profile-banner{height:160px;background:linear-gradient(135deg,rgba(0,229,255,0.06) 0%,rgba(255,179,0,0.04) 50%,var(--deep) 100%);border-bottom:1px solid var(--border)}
.profile-avatar{width:96px;height:96px;min-width:96px;min-height:96px;max-width:96px;max-height:96px;border-radius:4px;border:3px solid var(--card);margin-top:-48px;position:relative;z-index:2;object-fit:cover;flex-shrink:0}
.stat-box{text-align:center;padding:14px 0;border-right:1px solid var(--border)}.stat-box:last-child{border-right:none}
.stat-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:28px;line-height:1;color:var(--txt)}.stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-top:2px}
.clickable-name{cursor:pointer;transition:color .15s}.clickable-name:hover{color:var(--cyan)!important}
#fab{position:fixed;bottom:28px;right:28px;z-index:900;width:60px;height:60px;border-radius:50%;background:var(--cyan);color:#080C16;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,229,255,0.3);transition:.2s;display:none;align-items:center;justify-content:center}#fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(0,229,255,0.45)}#fab.visible{display:flex}
.collab-check{accent-color:var(--green);width:18px;height:18px;cursor:pointer}
.msg-layout{display:flex;flex-direction:column;height:calc(100vh - 72px);background:var(--deep)}.msg-list-panel{flex-shrink:0;height:100%;overflow-y:auto;border-right:1px solid var(--border)}
.msg-list-item{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}.msg-list-item:hover{background:rgba(0,229,255,0.04)}.msg-list-item.active{background:rgba(0,229,255,0.08);border-left:3px solid var(--cyan)}
.msg-avatar{width:44px;height:44px;border-radius:4px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.msg-preview{flex:1;min-width:0}.msg-preview-name{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:15px;color:var(--txt);letter-spacing:1px}.msg-preview-text{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.msg-unread-badge{background:var(--cyan);color:var(--deep);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg-chat-panel{flex:1;display:flex;flex-direction:column;height:100%}.msg-chat-header{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(17,24,39,0.95);backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;z-index:10}
.msg-chat-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg-bubble{max-width:75%;padding:12px 16px;border-radius:4px;font-size:14px;line-height:1.5}.msg-bubble.sent{align-self:flex-end;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:var(--txt)}.msg-bubble.received{align-self:flex-start;background:var(--card);border:1px solid var(--border);color:var(--txt)}
.msg-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--txt3);margin-top:6px;text-align:right;letter-spacing:1px}
.msg-input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--card);display:flex;gap:12px;align-items:center}.msg-input-area input{flex:1}
.msg-empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--txt3)}
.contest-subtabs{display:flex;border-bottom:1px solid var(--border);margin-top:16px}.contest-subtab{flex:1;text-align:center;padding:14px 0;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:2px;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none}.contest-subtab:hover{color:var(--txt2)}.contest-subtab.active{color:var(--amber);border-bottom-color:var(--amber)}
.masonry-grid{columns:2;column-gap:16px}.masonry-item{break-inside:avoid;margin-bottom:16px}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .3s ease-out}.accordion-body.open{max-height:200px}
.badge-rack{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
.badge-item{position:relative;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--card);border:2px solid var(--border);color:var(--txt3);font-size:18px}.badge-item:hover{transform:translateY(-4px)}
.badge-item.t1{border-color:#FFD700;color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,0.3)}.badge-item.t2{border-color:#C0C0C0;color:#C0C0C0;box-shadow:0 0 8px rgba(192,192,192,0.2)}.badge-item.t3{border-color:#CD7F32;color:#CD7F32;box-shadow:0 0 8px rgba(205,127,50,0.2)}
.badge-popup{position:absolute;top:120%;left:50%;transform:translateX(-50%) scale(0.9);width:220px;background:var(--elevated);border:1px solid var(--border);border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:50;opacity:0;pointer-events:none;transition:all .2s ease;overflow:hidden}.badge-item:hover .badge-popup{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto}
.badge-popup img{width:100%;height:120px;object-fit:cover;border-bottom:1px solid var(--border)}.badge-popup-info{padding:12px;text-align:center;background:var(--elevated)}
.creator-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:2px;background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(0,229,255,0.2));border:1px solid var(--purple);color:var(--purple);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.creator-badge i{font-size:14px}
.admin-delete-btn{padding:6px 12px;font-size:11px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;transition:all .2s}
.admin-delete-btn:hover{background:rgba(255,61,87,0.1)}
.admin-edit-btn{padding:6px 12px;font-size:11px;background:transparent;border:1px solid var(--cyan);color:var(--cyan);border-radius:3px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;transition:all .2s}
.admin-edit-btn:hover{background:rgba(0,229,255,0.1)}
.ad-slot-container{max-width:960px;margin:0 auto 24px}.ad-slot-hud{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:16px;text-align:center;position:relative;overflow:hidden;min-height:100px;display:flex;align-items:center;justify-content:center}.ad-slot-hud::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0.3}
.ad-label{position:absolute;top:4px;right:8px;font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--txt3);text-transform:uppercase}
.ad-mobile-sticky{position:fixed;bottom:0;left:0;right:0;z-index:950;background:rgba(8,12,22,0.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:8px;text-align:center;display:none}
.loading-overlay{position:fixed;inset:0;z-index:4000;background:var(--deep);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.hidden{display:none}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.countdown-grid{display:flex;justify-content:center;gap:16px;margin:24px 0}
.countdown-box{text-align:center;min-width:70px;padding:16px 12px;background:rgba(255,179,0,0.1);border:1px solid rgba(255,179,0,0.3);border-radius:4px}
.countdown-num{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:36px;color:var(--amber);line-height:1}
.countdown-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--txt2);text-transform:uppercase;margin-top:4px}
@media(max-width:768px){.ad-mobile-sticky{display:block}.ad-mobile-sticky .ad-slot-hud{border:none;background:transparent;min-height:60px}}
@media(min-width:768px){.msg-layout{flex-direction:row}.msg-list-panel{width:320px;height:auto}}
@media(max-width:768px){.nav-inner{padding:0 12px;height:60px}.nav-logo{font-size:20px;letter-spacing:2px}.nav-tab{padding:8px 12px;font-size:0}.nav-tab i{font-size:16px}.sw-btn{padding:12px 20px;font-size:13px}.stat-num{font-size:22px}.profile-avatar{width:72px;height:72px;min-width:72px;min-height:72px;margin-top:-36px}#fab{bottom:20px;right:20px;width:52px;height:52px;font-size:22px}#lightbox-img{max-width:98vw;max-height:85vh}.story-img-wrap{height:260px}.story-img-wrap .story-text{padding:16px 20px}.story-img-wrap .story-text h2{font-size:1.2rem!important}.countdown-grid{gap:8px}.countdown-box{min-width:55px;padding:12px 8px}.countdown-num{font-size:24px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>

<body>
<div id="loading-overlay" class="loading-overlay"><div class="loading-spinner"></div><p class="sys-label" style="color:var(--cyan)">LOADING SMALLWORLD...</p></div>
<nav id="main-nav"><div class="nav-inner"><div class="nav-logo" onclick="showPage('feed')">SMALL<span>WORLD</span></div><div class="nav-tabs"><button class="nav-tab active" data-page="feed" onclick="showPage('feed')"><i class="fa-solid fa-layer-group"></i> FEED</button><button class="nav-tab" data-page="map" onclick="showPage('map')"><i class="fa-solid fa-map-location-dot"></i> MAP</button><button class="nav-tab" data-page="wiki" onclick="showPage('wiki')"><i class="fa-solid fa-book"></i> WIKI</button><button class="nav-tab" data-page="bts" onclick="showPage('bts')"><i class="fa-solid fa-bolt"></i> BTS</button><button class="nav-tab" data-page="contest" onclick="showPage('contest')"><i class="fa-solid fa-trophy"></i> CONTEST</button><button class="nav-tab" data-page="msg" onclick="showPage('msg')"><i class="fa-solid fa-comment-dots"></i> DMs</button><button class="nav-tab" data-page="about" onclick="showPage('about')"><i class="fa-solid fa-circle-info"></i> ABOUT</button></div><div class="nav-user"><button id="nav-avatar-btn" class="nav-avatar-btn" onclick="toggleUserDropdown(event)"><img id="nav-avatar-img" src="https://picsum.photos/seed/sw-guest/100/100" alt="User"></button><div id="user-dropdown" class="user-dropdown"></div></div></div><div class="scan-line"></div></nav>
<main id="page-container" style="padding-top:72px;min-height:100vh;width:100%;">
<section id="page-feed" class="page active"><div id="feed-content"></div></section>
<section id="page-map" class="page"><div id="map-content"></div></section>
<section id="page-wiki" class="page"><div id="wiki-content"></div></section>
<section id="page-bts" class="page"><div id="bts-content"></div></section>
<section id="page-contest" class="page"><div id="contest-content"></div></section>
<section id="page-msg" class="page"><div id="msg-content"></div></section>
<section id="page-profile" class="page"><div id="profile-content"></div></section>
<section id="page-about" class="page"><div id="about-content"></div></section>
</main>
<button id="fab" onclick="openModal('create-story')"><i class="fa-solid fa-plus"></i></button>
<div class="ad-mobile-sticky"><div class="ad-slot-hud"><span class="ad-label">Partner</span><span style="color:var(--txt3);font-size:12px;">[Mobile Ad Slot]</span></div></div>
<div id="modal-overlay"><div id="modal-box"><div id="modal-inner"></div></div></div>
<div id="lightbox-overlay" onclick="closeLightbox()"><button id="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button><img id="lightbox-img" src="" alt="Full size"></div>
<div id="toast-container"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var SUPABASE_URL='https://qrcfqtmvnpkcbucllrkt.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyY2ZxdG12bnBrY2J1Y2xscmt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMDEzMjcsImV4cCI6MjA5MDU3NzMyN30.k4VzB9zEzNlF0hFLOdqeWI9R6YhcEOj6CpOYtC_8SD0';
var isLive=false,supabaseClient=null;
try{if(typeof window.supabase!=='undefined'){supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);isLive=true;}}catch(e){console.error('Supabase init error:',e);}
var ADMIN_USERS=['toyzforshotz'];
var DB={users:[],posts:[],locations:[],wiki:[],btsEntries:[],conversations:[],messages:[],contestEntries:[],contestConfig:{active:false,theme:'',month:'',deadline:null,prize:'',rules:''},aboutContent:null};
var currentUser={id:null,name:'Guest',email:'guest@smallworld.io',avatar:'https://picsum.photos/seed/guest/100/100',bio:'',followers:[],following:[],joined:Date.now(),badges:[],isAdmin:false};
var currentPage='feed',previousPage='feed',lastProfileName='',isPinning=false,mapInstance=null,mapInitialized=false,mapMarkers=[];
var pendingPinCoords=null,pendingFinalImage=null,pendingBtsFinalImage=null,pendingBtsSetupImage=null,pendingLocImage=null,pendingAvatarImage=null,pendingContestImage=null;
var activeConvoId=null,activeContestTab='entries',activeWikiCat='All',selectedLocType='Spot';
var userLocation={lat:40.7128,lng:-74.006};
var dataLoaded=false,countdownInterval=null;
if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(p){userLocation.lat=p.coords.latitude;userLocation.lng=p.coords.longitude;if(mapInstance)mapInstance.setView([userLocation.lat,userLocation.lng],12);},function(){});}

function compressImage(dataUrl,maxW,quality){return new Promise(function(resolve){var img=new Image();img.onerror=function(){resolve(dataUrl);};img.onload=function(){var w=img.width,h=img.height;if(w<=maxW){resolve(dataUrl);return;}h=Math.round(h*maxW/w);w=maxW;var c=document.createElement('canvas');c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.fillStyle='#0B1120';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);try{resolve(c.toDataURL('image/jpeg',quality));}catch(e){resolve(dataUrl);}};img.src=dataUrl;});}
function hideLoading(){var el=document.getElementById('loading-overlay');if(el)el.classList.add('hidden');}
function isAdminUser(n){return ADMIN_USERS.indexOf(n.toLowerCase())!==-1;}
setTimeout(function(){hideLoading();},5000);

async function loadAllDataFromSupabase(){
  if(!isLive){hideLoading();renderFeed();document.getElementById('fab').classList.add('visible');return;}
  try{
    var postsRes=await supabaseClient.from('posts').select('*').order('created_at',{ascending:false});
    if(!postsRes.error&&postsRes.data)DB.posts=postsRes.data.map(function(p){return{id:p.id,parentId:p.parent_id||null,author:p.author||'Anonymous',avatar:p.avatar||'https://picsum.photos/seed/'+p.id+'/100/100',title:p.title,image:p.image||'',btsImage:p.bts_image||'',caption:p.caption||'',tags:p.tags||[],timestamp:p.created_at?new Date(p.created_at).getTime():Date.now(),likes:p.likes||0,collabOpen:p.collab_open!==false};});
    var btsRes=await supabaseClient.from('bts_entries').select('*').order('created_at',{ascending:false});
    if(!btsRes.error&&btsRes.data)DB.btsEntries=btsRes.data.map(function(b){return{id:b.id,author:b.author,avatar:b.avatar,title:b.title,image:b.image,btsImage:b.bts_image,caption:b.caption,tags:b.tags,timestamp:new Date(b.created_at).getTime(),likes:b.likes};});
    var locRes=await supabaseClient.from('locations').select('*');
    if(!locRes.error&&locRes.data)DB.locations=locRes.data.map(function(l){return{id:l.id,type:l.type||'Spot',name:l.name,lat:parseFloat(l.lat),lng:parseFloat(l.lng),description:l.description,author:l.author,votes:l.votes,img:l.img};});
    var wikiRes=await supabaseClient.from('wiki').select('*').order('last_updated',{ascending:false});
    if(!wikiRes.error&&wikiRes.data)DB.wiki=wikiRes.data.map(function(w){return{id:w.id,author:w.author,title:w.title,category:w.category,content:w.content,lastUpdated:new Date(w.last_updated).getTime()};});
    var usersRes=await supabaseClient.from('users').select('*');
    if(!usersRes.error&&usersRes.data)DB.users=usersRes.data.map(function(u){return{id:u.id,email:u.email,name:u.name,avatar:u.avatar,bio:u.bio,followers:[],following:[],joined:u.joined?new Date(u.joined).getTime():Date.now(),badges:u.badges||[]};});
    try{var contestRes=await supabaseClient.from('contest_config').select('*').limit(1).single();if(!contestRes.error&&contestRes.data)DB.contestConfig={active:contestRes.data.active,theme:contestRes.data.theme,month:contestRes.data.month,deadline:contestRes.data.deadline?new Date(contestRes.data.deadline).getTime():null,prize:contestRes.data.prize,rules:contestRes.data.rules};}catch(ce){}
    try{var entriesRes=await supabaseClient.from('contest_entries').select('*').order('created_at',{ascending:false});if(!entriesRes.error&&entriesRes.data)DB.contestEntries=entriesRes.data.map(function(e){return{id:e.id,author:e.author,avatar:e.avatar,title:e.title,image:e.image,caption:e.caption,timestamp:new Date(e.created_at).getTime(),likes:e.likes,isWinner:e.is_winner};});}catch(ee){}
    dataLoaded=true;
  }catch(e){console.error('Data load error:',e);}
  finally{hideLoading();renderFeed();document.getElementById('fab').classList.add('visible');}
}

async function loadAboutFromDB(){
  if(!isLive)return;
  try{
    var res=await supabaseClient.from('site_config').select('*').eq('key','about_content').limit(1).single();
    if(!res.error&&res.data&&res.data.value){
      DB.aboutContent=JSON.parse(res.data.value);
    }
  }catch(e){
    console.log('No custom about content found, using default');
  }
}

function updateUserDropdown(){var dd=document.getElementById('user-dropdown');if(currentUser.id){var ah=currentUser.isAdmin?'<button onclick="showToast(\'Admin enabled\',\'info\');closeUserDropdown()"><i class="fa-solid fa-shield-halved"></i> ADMIN</button>':'';dd.innerHTML=ah+'<button onclick="showProfile(currentUser.name);closeUserDropdown()"><i class="fa-solid fa-user"></i> MY PROFILE</button><button onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> LOGOUT</button>';}else{dd.innerHTML='<button onclick="openModal(\'auth\');closeUserDropdown()"><i class="fa-solid fa-right-to-bracket"></i> LOGIN / SIGNUP</button>';}}

async function initApp(){if(isLive){try{var sr=await supabaseClient.auth.getSession();if(sr.data.session){var uid=sr.data.session.user.id;var pr=await supabaseClient.from('users').select('*').eq('id',uid).single();if(pr.data){var u=pr.data,uname=u.name||u.email.split('@')[0];currentUser={id:uid,email:u.email,name:uname,avatar:u.avatar,bio:u.bio,followers:[],following:[],joined:u.joined?new Date(u.joined).getTime():Date.now(),badges:u.badges||[],isAdmin:isAdminUser(uname)};document.getElementById('nav-avatar-img').src=currentUser.avatar;updateUserDropdown();}}}catch(e){}}await loadAllDataFromSupabase();await loadAboutFromDB();updateUserDropdown();}
initApp();

function timeAgo(ts){var d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/36e5),dd=Math.floor(d/864e5);return dd>0?dd+'d ago':h>0?h+'h ago':m>0?m+'m ago':'now';}
function findUser(n){return DB.users.find(function(u){return u.name===n;})||null;}
function safeTags(tags){return tags||[];}
function getRootPosts(){return DB.posts.filter(function(p){return p.parentId===null;});}
function getChapters(pid){return DB.posts.filter(function(p){return p.parentId===pid;}).sort(function(a,b){return a.timestamp-b.timestamp;});}
function canEditWiki(e){return currentUser.name===e.author;}
function showToast(msg,type){type=type||'info';var c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast '+type;var ic={success:'fa-circle-check',info:'fa-circle-info',error:'fa-circle-xmark'};t.innerHTML='<i class="fa-solid '+(ic[type]||ic.info)+'"></i><span>'+msg+'</span>';c.appendChild(t);setTimeout(function(){t.classList.add('removing');setTimeout(function(){t.remove();},300);},3200);}
function toggleUserDropdown(e){e.stopPropagation();document.getElementById('user-dropdown').classList.toggle('open');}
function closeUserDropdown(){document.getElementById('user-dropdown').classList.remove('open');}
document.addEventListener('click',function(e){var dd=document.getElementById('user-dropdown'),btn=document.getElementById('nav-avatar-btn');if(dd&&btn&&!btn.contains(e.target)&&!dd.contains(e.target))closeUserDropdown();});
function openLightbox(src){if(!src)return;document.getElementById('lightbox-img').src=src;document.getElementById('lightbox-overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox-overlay').classList.remove('open');document.body.style.overflow='';document.getElementById('lightbox-img').src='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeLightbox();closeModal();}});

function showPage(pageId){if(pageId!=='profile')previousPage=currentPage;currentPage=pageId;window.scrollTo(0,0);document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-page')===pageId);});document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById('page-'+pageId).classList.add('active');var fab=document.getElementById('fab');if(pageId==='feed'){fab.classList.add('visible');fab.onclick=function(){openModal('create-story');};}else if(pageId==='bts'){fab.classList.add('visible');fab.onclick=function(){openModal('create-bts');};}else{fab.classList.remove('visible');}renderPage(pageId);if(pageId==='map'){if(!mapInitialized){setTimeout(initMap,150);mapInitialized=true;}else{setTimeout(function(){if(mapInstance)mapInstance.invalidateSize();},150);}}if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}}
function renderPage(pageId){if(pageId==='feed')renderFeed();else if(pageId==='wiki')renderWiki();else if(pageId==='bts')renderBTS();else if(pageId==='msg')renderMessages();else if(pageId==='contest')renderContest();else if(pageId==='profile')renderProfile(lastProfileName);else if(pageId==='about')renderAbout();}
function showProfile(name){var user=findUser(name);if(!user&&name===currentUser.name)user=currentUser;if(!user){showToast('User not found','error');return;}lastProfileName=name;previousPage=currentPage;currentPage='profile';window.scrollTo(0,0);document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById('page-profile').classList.add('active');document.getElementById('fab').classList.remove('visible');renderProfile(name);}
function goBack(){showPage(previousPage);}

function readImageFile(inputEl,previewId,callback){if(!inputEl.files||!inputEl.files[0])return;var file=inputEl.files[0];if(!file.type.startsWith('image/')){showToast('Please select an image file','error');inputEl.value='';return;}if(file.size>50*1024*1024){showToast('Image must be under 50MB','error');inputEl.value='';return;}var reader=new FileReader();reader.onload=function(e){compressImage(e.target.result,1600,0.82).then(function(compressed){var zone=document.getElementById(previewId);if(zone){zone.classList.add('has-image');zone.querySelector('.uz-preview img').src=compressed;}callback(compressed);});};reader.readAsDataURL(file);}
function clearUpload(previewId,callback){var zone=document.getElementById(previewId);if(zone){zone.classList.remove('has-image');zone.querySelector('.uz-preview img').src='';var inp=zone.querySelector('input[type="file"]');if(inp)inp.value='';}callback(null);}
function uploadZoneHTML(id,label,sub,imgVar,required){return '<div id="'+id+'" class="upload-zone'+(required?' required-zone':'')+'" onclick="this.querySelector(\'input\').click()"><input type="file" accept="image/*" onchange="readImageFile(this,\''+id+'\',function(d){'+imgVar+'=d;})" onclick="event.stopPropagation()"><div class="uz-preview"><img src="" alt="Preview"></div><button class="uz-remove" type="button" onclick="event.stopPropagation();clearUpload(\''+id+'\',function(){'+imgVar+'=null;})"><i class="fa-solid fa-xmark"></i></button><div class="uz-placeholder"><i class="fa-solid fa-cloud-arrow-up" style="font-size:24px;color:var(--txt3);"></i><span class="uz-label">'+label+'</span>'+(required?'<span class="uz-sub" style="color:var(--red);">REQUIRED</span>':'<span class="uz-sub">'+sub+'</span>')+'</div></div>';}

function openModal(type,data){closeUserDropdown();var inner=document.getElementById('modal-inner'),html='';var cb='<button onclick="closeModal()" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:20px"><i class="fa-solid fa-xmark"></i></button>';

async function handleLogin(){if(!isLive)return;var email=document.getElementById('auth-email').value.trim(),pass=document.getElementById('auth-pass').value;if(!email||!pass){showToast('Email and password required','error');return;}showToast('Logging in...','info');try{var r=await supabaseClient.auth.signInWithPassword({email:email,password:pass});if(r.error){showToast(r.error.message,'error');return;}var uid=r.data.user.id;var pr=await supabaseClient.from('users').select('*').eq('id',uid).single();if(pr.data){var u=pr.data,uname=u.name||email.split('@')[0];currentUser={id:uid,email:email,name:uname,avatar:u.avatar,bio:u.bio,followers:[],following:[],joined:u.joined?new Date(u.joined).getTime():Date.now(),badges:u.badges||[],isAdmin:isAdminUser(uname)};}document.getElementById('nav-avatar-img').src=currentUser.avatar;updateUserDropdown();closeModal();renderPage(currentPage);showToast('Welcome back, '+currentUser.name+'!','success');}catch(e){showToast('Error: '+e.message,'error');}}

async function handleSignup(){if(!isLive)return;var username=document.getElementById('auth-username').value.trim(),email=document.getElementById('auth-email').value.trim(),pass=document.getElementById('auth-pass').value;if(!username||username.length<2){showToast('Username must be at least 2 characters','error');return;}if(!email||!pass){showToast('Email and password required','error');return;}showToast('Creating account...','info');try{var r=await supabaseClient.auth.signUp({email:email,password:pass});if(r.error){showToast(r.error.message,'error');return;}await supabaseClient.from('users').insert([{id:r.data.user.id,email:email,name:username,avatar:'https://picsum.photos/seed/'+Date.now()+'/100/100',bio:'New to SmallWorld!'}]);var nu={id:r.data.user.id,email:email,name:username,avatar:'https://picsum.photos/seed/'+Date.now()+'/100/100',bio:'New to SmallWorld!',followers:[],following:[],joined:Date.now(),badges:[],isAdmin:isAdminUser(username)};DB.users.push(nu);currentUser=nu;document.getElementById('nav-avatar-img').src=currentUser.avatar;updateUserDropdown();closeModal();renderPage(currentPage);showToast('Welcome to SmallWorld, '+username+'!','success');}catch(e){showToast('Error: '+e.message,'error');}}

async function handleLogout(){if(isLive){try{await supabaseClient.auth.signOut();}catch(e){}}currentUser={id:null,name:'Guest',email:'guest@smallworld.io',avatar:'https://picsum.photos/seed/guest/100/100',bio:'',followers:[],following:[],joined:Date.now(),badges:[],isAdmin:false};document.getElementById('nav-avatar-img').src=currentUser.avatar;updateUserDropdown();showPage('feed');showToast('Logged out','info');}

function setLocType(t){selectedLocType=t;var s=document.getElementById('loc-type-spot'),st=document.getElementById('loc-type-store');if(!s||!st)return;s.className='sw-btn sw-btn-'+(t==='Spot'?'outline':'ghost')+' flex-1 justify-center';st.className='sw-btn sw-btn-'+(t==='Store'?'outline':'ghost')+' flex-1 justify-center';s.style.fontSize='13px';st.style.fontSize='13px';}

async function uploadToSupabase(base64Data,path){if(!isLive)return base64Data;try{var res=await fetch(base64Data);var blob=await res.blob();var fn=path+'_'+Date.now()+'.jpg';var r=await supabaseClient.storage.from('photos').upload(fn,blob,{contentType:'image/jpeg'});if(r.error)throw r.error;return supabaseClient.storage.from('photos').getPublicUrl(fn).data.publicUrl;}catch(e){console.error('Upload error:',e);showToast('Image upload failed','error');return null;}}

async function submitCreateStory(){if(!currentUser.id){showToast('Please login first','error');return;}var title=document.getElementById('cs-title').value.trim(),caption=document.getElementById('cs-caption').value.trim(),tagsRaw=document.getElementById('cs-tags').value.trim(),collab=document.getElementById('cs-collab').checked;if(!title||!caption){showToast('Title and caption required','error');return;}if(!pendingFinalImage){showToast('Please upload your final shot','error');return;}var tags=tagsRaw?tagsRaw.split(',').map(function(t){return t.trim().toLowerCase();}).filter(Boolean):[];showToast('Publishing...','info');var finalUrl=await uploadToSupabase(pendingFinalImage,'finals');if(!finalUrl)return;var newPost={id:'p'+Date.now(),parentId:null,author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,btsImage:'',caption:caption,tags:tags,timestamp:Date.now(),likes:0,collabOpen:collab};DB.posts.unshift(newPost);if(isLive){try{await supabaseClient.from('posts').insert([{author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,caption:caption,tags:tags,collab_open:collab}]);}catch(e){}}closeModal();renderFeed();showToast('Story published!','success');}

async function submitCreateBTS(){if(!currentUser.id){showToast('Please login first','error');return;}var title=document.getElementById('bts-title').value.trim(),caption=document.getElementById('bts-caption').value.trim(),tagsRaw=document.getElementById('bts-tags').value.trim();if(!pendingBtsFinalImage||!pendingBtsSetupImage){showToast('Both photos are required','error');return;}if(!title){showToast('Title is required','error');return;}var tags=tagsRaw?tagsRaw.split(',').map(function(t){return t.trim().toLowerCase();}).filter(Boolean):[];showToast('Publishing BTS...','info');var finalUrl=await uploadToSupabase(pendingBtsFinalImage,'bts_finals');var setupUrl=await uploadToSupabase(pendingBtsSetupImage,'bts_setups');if(!finalUrl||!setupUrl)return;var newBts={id:'bts'+Date.now(),author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,btsImage:setupUrl,caption:caption||'',tags:tags,timestamp:Date.now(),likes:0};DB.btsEntries.unshift(newBts);if(isLive){try{await supabaseClient.from('bts_entries').insert([{author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,bts_image:setupUrl,caption:caption||'',tags:tags}]);}catch(e){}}closeModal();renderBTS();showToast('BTS published!','success');}

async function submitStory(parentId){if(!currentUser.id){showToast('Please login first','error');return;}var title=document.getElementById('ch-title').value.trim(),caption=document.getElementById('ch-caption').value.trim(),tagsRaw=document.getElementById('ch-tags').value.trim();if(!title||!caption||!pendingFinalImage){showToast('All fields required','error');return;}var tags=tagsRaw?tagsRaw.split(',').map(function(t){return t.trim().toLowerCase();}).filter(Boolean):[];showToast('Publishing chapter...','info');var finalUrl=await uploadToSupabase(pendingFinalImage,'chapters');if(!finalUrl)return;var newChapter={id:'p'+Date.now(),parentId:parentId,author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,btsImage:'',caption:caption,tags:tags,timestamp:Date.now(),likes:0,collabOpen:false};DB.posts.push(newChapter);if(isLive){try{await supabaseClient.from('posts').insert([{parent_id:parentId,author:currentUser.name,avatar:currentUser.avatar,title:title,image:finalUrl,caption:caption,tags:tags}]);}catch(e){}}closeModal();renderFeed();showToast('Chapter added!','success');}

function likePost(id){var p=DB.posts.find(function(x){return x.id===id;});if(p){p.likes++;if(isLive){supabaseClient.from('posts').update({likes:p.likes}).eq('id',id).catch(function(){});}renderFeed();showToast('Liked!','success');}}

function toggleFollow(name){if(!currentUser.id){showToast('Please login first','error');return;}var target=findUser(name);if(!target||name===currentUser.name)return;var i=currentUser.following.indexOf(name);if(i!==-1){currentUser.following.splice(i,1);var ti=target.followers.indexOf(currentUser.name);if(ti!==-1)target.followers.splice(ti,1);showToast('Unfollowed '+name,'info');}else{currentUser.following.push(name);target.followers.push(currentUser.name);showToast('Now following '+name,'success');}renderProfile(name);}

async function submitEditProfile(){if(!currentUser.id){showToast('Please login first','error');return;}var bio=document.getElementById('ep-bio').value.trim();var avatarUrl=currentUser.avatar;if(pendingAvatarImage){showToast('Uploading avatar...','info');avatarUrl=await uploadToSupabase(pendingAvatarImage,'avatars');if(!avatarUrl){showToast('Avatar upload failed','error');return;}}currentUser.bio=bio;currentUser.avatar=avatarUrl;if(isLive){try{await supabaseClient.from('users').update({bio:bio,avatar:avatarUrl}).eq('id',currentUser.id);}catch(e){showToast('Error saving profile','error');return;}}document.getElementById('nav-avatar-img').src=currentUser.avatar;closeModal();renderProfile(currentUser.name);showToast('Profile updated!','success');}

async function deletePost(postId){if(isLive){try{await supabaseClient.from('posts').delete().eq('id',postId);}catch(e){}}DB.posts=DB.posts.filter(function(p){return p.id!==postId;});closeModal();renderPage(currentPage);showToast('Post deleted','success');}

async function submitAboutEdit(){
  if(!currentUser.isAdmin){
    showToast('Admin only','error');
    return;
  }
  var title=document.getElementById('about-title').value.trim();
  var mission=document.getElementById('about-mission').value.trim();
  var sectionsRaw=document.getElementById('about-sections').value.trim();
  if(!title||!mission||!sectionsRaw){
    showToast('All fields required','error');
    return;
  }
  var sections=[];
  sectionsRaw.split('\n').forEach(function(line){
    var parts=line.split('|');
    if(parts.length>=3){
      sections.push({
        title:parts[0].trim(),
        icon:parts[1].trim(),
        desc:parts[2].trim()
      });
    }
  });
  if(sections.length===0){
    showToast('At least one section required','error');
    return;
  }
  DB.aboutContent={
    title:title,
    mission:mission,
    sections:sections
  };
  if(isLive){
    try{
      var existing=await supabaseClient.from('site_config').select('id').eq('key','about_content').limit(1).single();
      if(existing.data){
        await supabaseClient.from('site_config').update({
          value:JSON.stringify(DB.aboutContent)
        }).eq('key','about_content');
      }else{
        await supabaseClient.from('site_config').insert([{
          key:'about_content',
          value:JSON.stringify(DB.aboutContent)
        }]);
      }
      showToast('About page updated!','success');
    }catch(e){
      showToast('Error saving: '+e.message,'error');
      return;
    }
  }
  closeModal();
  renderAbout();
  showToast('About page saved!','success');
}

function renderContest(){if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}var c=DB.contestConfig;var h='<div class="dot-grid" style="min-height:100vh;padding:0 0 80px;">';if(!c.active||!c.theme){h+='<div style="text-align:center;padding:80px 20px;"><i class="fa-solid fa-trophy" style="font-size:64px;color:var(--amber);margin-bottom:24px;opacity:0.5;"></i><h1 class="font-display font-bold text-4xl tracking-widest mb-4" style="color:var(--amber)">CONTEST</h1><h2 class="font-display font-bold text-2xl tracking-wider mb-6" style="color:var(--txt2)">COMING SOON</h2><p class="text-lg mb-8" style="color:var(--txt2);max-width:400px;margin:0 auto;">We\'re preparing something special. Check back soon!</p>'+(currentUser.isAdmin?'<button onclick="openModal(\'edit-contest\')" class="sw-btn sw-btn-amber"><i class="fa-solid fa-gear"></i> SETUP CONTEST</button>':'')+'</div>';}else{h+='<div class="hud-frame" style="height:280px;overflow:hidden;"><span class="hud-corner tl"></span><span class="hud-corner tr"></span><span class="hud-corner bl"></span><span class="hud-corner br"></span><img src="https://images.unsplash.com/photo-1608889825205-eebdb9fc5806?w=1200&q=80" alt="Contest" style="width:100%;height:100%;object-fit:cover;"><div style="position:absolute;inset:0;background:linear-gradient(to top,var(--deep) 10%,rgba(8,12,22,0.4) 50%,transparent 80%);"></div><div style="position:absolute;bottom:0;left:0;right:0;padding:32px;"><div class="flex items-center gap-4 mb-4"><div class="h-px flex-1" style="background:var(--border)"></div><h1 class="font-display font-bold text-3xl tracking-widest" style="color:var(--amber)">MONTHLY CONTEST</h1><div class="h-px flex-1" style="background:var(--border)"></div></div><p class="sys-label" style="color:var(--cyan);margin-bottom:8px;">'+c.month+'</p><h2 class="font-display font-bold text-4xl tracking-wider" style="line-height:1;">'+c.theme+'</h2></div></div><div style="max-width:960px;margin:0 auto;padding:24px;">';if(c.deadline&&c.deadline>Date.now()){h+='<div class="sw-card p-6 mb-6"><div class="flex flex-col sm:flex-row items-center justify-between gap-4"><div><span class="sys-label"><span class="sys-dot amber"></span> TIME REMAINING</span><div id="countdown" class="countdown-grid"></div></div>'+(currentUser.isAdmin?'<button onclick="openModal(\'edit-contest\')" class="sw-btn sw-btn-ghost sw-btn-sm"><i class="fa-solid fa-pen"></i> EDIT</button>':'')+'</div></div>';}h+='<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 p-4 rounded mb-4" style="background:var(--card);border:1px solid var(--border);"><div><span class="sys-label"><span class="sys-dot amber"></span> '+DB.contestEntries.length+' ENTRIES</span></div><button onclick="openModal(\'submit-contest\')" class="sw-btn sw-btn-primary"><i class="fa-solid fa-cloud-arrow-up"></i> SUBMIT</button></div><div class="sw-card" style="cursor:pointer;" onclick="this.querySelector(\'.accordion-body\').classList.toggle(\'open\');this.querySelector(\'#contest-acc-arrow\').style.transform=this.querySelector(\'.accordion-body\').classList.contains(\'open\')?\'rotate(180deg)\':\'rotate(0)\';"><div class="p-4 flex items-center justify-between"><span class="font-display font-semibold tracking-wider" style="color:var(--txt2)"><i class="fa-solid fa-list-ul mr-2"></i>RULES & PRIZES</span><i id="contest-acc-arrow" class="fa-solid fa-chevron-down" style="color:var(--txt3);transition:transform .2s;"></i></div><div class="accordion-body"><div class="px-4 pb-4 text-sm leading-relaxed" style="border-top:1px solid var(--border);padding-top:16px;">'+(c.rules||'No rules specified')+'<div class="mt-4 p-3 rounded" style="background:var(--deep);border:1px solid var(--border);"><span class="sys-label" style="color:var(--amber)">PRIZE:</span> <span style="color:var(--txt);font-weight:bold;">'+(c.prize||'TBA')+'</span></div></div></div></div></div>'+(currentUser.isAdmin?'<div class="mt-4 p-4 rounded" style="background:rgba(255,179,0,0.1);border:1px solid rgba(255,179,0,0.3);"><span class="sys-label" style="color:var(--amber)"><i class="fa-solid fa-shield-halved mr-2"></i>ADMIN</span><div class="flex gap-3 mt-3"><button onclick="openModal(\'edit-contest\')" class="admin-edit-btn"><i class="fa-solid fa-pen"></i> EDIT</button><button onclick="DB.contestConfig.active=false;renderContest();showToast(\'Contest ended\',\'info\')" class="admin-delete-btn"><i class="fa-solid fa-flag-checkered"></i> END</button></div></div>':'');h+='<div class="contest-subtabs"><button class="contest-subtab '+(activeContestTab==='entries'?'active':'')+'" onclick="switchContestTab(\'entries\')">ENTRIES</button><button class="contest-subtab '+(activeContestTab==='winners'?'active':'')+'" onclick="switchContestTab(\'winners\')">WINNERS</button></div><div id="contest-tab-content" class="mt-6"></div></div>';}h+='</div>';document.getElementById('contest-content').innerHTML=h;if(c.active&&c.deadline&&c.deadline>Date.now()){startCountdown(c.deadline);}renderContestTab(activeContestTab);}

function startCountdown(deadline){if(countdownInterval){clearInterval(countdownInterval);}function tick(){var now=Date.now(),diff=deadline-now;if(diff<=0){var el=document.getElementById('countdown');if(el)el.innerHTML='<span style="color:var(--red)">ENDED</span>';clearInterval(countdownInterval);return;}var d=Math.floor(diff/86400000),hr=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);var el=document.getElementById('countdown');if(el){el.innerHTML='<div class="countdown-box"><div class="countdown-num">'+d+'</div><div class="countdown-label">DAYS</div></div><div class="countdown-box"><div class="countdown-num">'+hr+'</div><div class="countdown-label">HRS</div></div><div class="countdown-box"><div class="countdown-num">'+m+'</div><div class="countdown-label">MIN</div></div><div class="countdown-box"><div class="countdown-num">'+s+'</div><div class="countdown-label">SEC</div></div>';}}tick();countdownInterval=setInterval(tick,1000);}
function switchContestTab(tabId){activeContestTab=tabId;document.querySelectorAll('.contest-subtab').forEach(function(t){t.classList.toggle('active',t.textContent.toLowerCase().indexOf(tabId)!==-1);});renderContestTab(tabId);}
function renderContestTab(tabId){var container=document.getElementById('contest-tab-content');if(!container)return;var h='';if(tabId==='entries'){var entries=DB.contestEntries.filter(function(e){return!e.isWinner;});if(entries.length===0){h+='<div style="text-align:center;padding:60px 20px;color:var(--txt3);"><i class="fa-solid fa-camera" style="font-size:48px;margin-bottom:16px;color:var(--border);"></i><h3 class="font-display font-bold text-lg tracking-wider mb-2" style="color:var(--txt2)">NO ENTRIES YET</h3><p class="text-sm">Be the first to submit!</p></div>';}else{h+='<div class="masonry-grid">';entries.forEach(function(e){h+='<div class="masonry-item hud-frame"><span class="hud-corner tl"></span><span class="hud-corner br"></span><div class="sw-card overflow-hidden"><img src="'+e.image+'" class="w-full block img-zoomable" alt="Entry" loading="lazy" onclick="openLightbox(this.src)"><div class="p-3 flex items-center justify-between"><div class="flex items-center gap-2"><img src="'+e.avatar+'" class="w-6 h-6 rounded" style="border:1px solid var(--cyan);" alt=""><span class="font-display text-sm font-semibold clickable-name" onclick="showProfile(\''+e.author+'\')">'+e.author+'</span></div><div class="flex items-center gap-2"><button onclick="likeContestEntry(\''+e.id+'\')" class="text-xs" style="color:var(--txt2);background:none;border:none;cursor:pointer;"><i class="fa-solid fa-heart"></i> '+e.likes+'</button>'+(currentUser.isAdmin?'<button onclick="setWinner(\''+e.id+'\')" class="admin-edit-btn sw-btn-sm"><i class="fa-solid fa-crown"></i></button>':'')+'</div></div></div></div></div>';});h+='</div>';}}else{var winners=DB.contestEntries.filter(function(e){return e.isWinner;});if(winners.length===0){h+='<div style="text-align:center;padding:60px 20px;color:var(--txt3);"><i class="fa-solid fa-medal" style="font-size:48px;margin-bottom:16px;color:var(--border);"></i><h3 class="font-display font-bold text-lg tracking-wider mb-2" style="color:var(--txt2)">NO WINNERS YET</h3></div>';}else{h+='<div class="flex flex-col gap-6">';winners.forEach(function(e){h+='<div class="sw-card"><div class="p-4 text-center" style="border-bottom:1px solid var(--border);background:rgba(255,215,0,0.1);"><i class="fa-solid fa-trophy" style="font-size:24px;color:#FFD700;"></i><h3 class="font-display font-bold text-xl tracking-wider mt-2" style="color:#FFD700;">WINNER</h3></div><img src="'+e.image+'" class="w-full block img-zoomable" alt="Winner" onclick="openLightbox(this.src)"><div class="p-4 flex items-center justify-content-between"><div class="flex items-center gap-2"><img src="'+e.avatar+'" class="w-8 h-8 rounded" style="border:2px solid #FFD700;" alt=""><span class="font-display font-semibold clickable-name" onclick="showProfile(\''+e.author+'\')">'+e.author+'</span></div><span class="sys-label">'+e.title+'</span></div></div></div>';});h+='</div>';}}container.innerHTML=h;}

  h+='</div></div>';

async function submitAboutEdit(){
  if(!currentUser.isAdmin){
    showToast('Admin only','error');
    return;
  }
  var title=document.getElementById('about-title').value.trim();
  var mission=document.getElementById('about-mission').value.trim();
  var sectionsRaw=document.getElementById('about-sections').value.trim();
  if(!title||!mission||!sectionsRaw){
    showToast('All fields required','error');
    return;
  }
  var sections=[];
  sectionsRaw.split('\n').forEach(function(line){
    var parts=line.split('|');
    if(parts.length>=3){
      sections.push({title:parts[0].trim(),icon:parts[1].trim(),desc:parts[2].trim()});
    }
  });
  if(sections.length===0){
    showToast('At least one section required','error');
    return;
  }
  DB.aboutContent={title:title,mission:mission,sections:sections};
  if(isLive){
    try{
      var existing=await supabaseClient.from('site_config').select('id').eq('key','about_content').limit(1).single();
      if(existing.data){
        await supabaseClient.from('site_config').update({value:JSON.stringify(DB.aboutContent)}).eq('key','about_content');
      }else{
        await supabaseClient.from('site_config').insert([{key:'about_content',value:JSON.stringify(DB.aboutContent)}]);
      }
      showToast('About page updated!','success');
    }catch(e){
      showToast('Error saving: '+e.message,'error');
      return;
    }
  }
  closeModal();
  renderAbout();
  showToast('About page saved!','success');
}

async function loadAboutFromDB(){
  if(!isLive)return;
  try{
    var res=await supabaseClient.from('site_config').select('*').eq('key','about_content').limit(1).single();
    if(!res.error&&res.data&&res.data.value){
      DB.aboutContent=JSON.parse(res.data.value);
    }
  }catch(e){
    console.log('No custom about content found, using default');
  }
}
</script>
